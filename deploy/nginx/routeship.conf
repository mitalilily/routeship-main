# RouteShip nginx reference.
# App bundle: /srv/routeship/current/landing/dist
# Admin bundle: /srv/routeship/current/admin-dashboard/build
# Backend API and Socket.IO: 127.0.0.1:5025

server {
    server_name routeship.in www.routeship.in;

    client_max_body_size 50m;
    root /srv/routeship/current/landing/dist;
    index index.html;

    location /api/ {
        proxy_pass http://127.0.0.1:5025/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 210s;
    }

    location /socket.io/ {
        proxy_pass http://127.0.0.1:5025/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 210s;
        proxy_send_timeout 210s;
    }

    location /client/assets/ {
        alias /srv/routeship/current/landing/dist/client/assets/;
        add_header Cache-Control 'public, max-age=31536000, immutable';
        try_files $uri =404;
    }

    location /client/ {
        alias /srv/routeship/current/landing/dist/client/;
        add_header Cache-Control 'no-store, no-cache, must-revalidate' always;
        try_files $uri $uri/ /client/index.html;
    }

    location /assets/ {
        add_header Cache-Control 'public, max-age=31536000, immutable';
        try_files $uri =404;
    }

    location / {
        add_header Cache-Control 'no-store, no-cache, must-revalidate' always;
        try_files $uri $uri/ /index.html;
    }
}
